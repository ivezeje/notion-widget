<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-out: #ffffff;
    --bg-in: #f3eeff;
    --spine: #e2d9f3;
    --text-main: #5a4a8a;
    --text-muted: #b0a0d0;
    --now-color: #f07878;
    --shadow: 0 2px 10px rgba(140,110,200,0.10);
    --yellow-bg:#fef9e0;--yellow-text:#b89a20;
    --purple-bg:#ede8f8;--purple-text:#7a60c0;
    --blue-bg:#dff0fc;--blue-text:#4a8fc0;
    --green-bg:#e0f7ec;--green-text:#3a9868;
    --pink-bg:#fde8f2;--pink-text:#c060a0;
    --peach-bg:#feeee6;--peach-text:#c07848;
    --PX: 14px;
    --SLOT: 48px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-out);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Setup ── */
  #setup {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    padding: 2rem 1.5rem; gap: 1rem;
    width: 100%; max-width: 360px;
  }
  .setup-emoji { font-size: 2.4rem; }
  .setup-title { font-size: 1.3rem; font-weight: 800; color: var(--text-main); }
  .setup-desc { font-size: 0.75rem; color: var(--text-muted); text-align: center; line-height: 1.8; }
  .input-group { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .input-group label { font-size: 0.68rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; }
  .input-group input {
    background: #f8f5ff; border: 1.5px solid var(--spine); color: var(--text-main);
    font-family: 'Nunito', sans-serif; font-size: 0.83rem; padding: 0.6rem 0.9rem;
    border-radius: 12px; outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: #c0a8f0; }
  .btn-start {
    background: var(--text-main); color: white; border: none;
    font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 800;
    padding: 0.7rem 2rem; border-radius: 50px; cursor: pointer; width: 100%;
    box-shadow: 0 4px 14px rgba(90,70,140,0.22); transition: opacity 0.15s;
  }
  .btn-start:hover { opacity: 0.88; }

  /* ── Widget ── */
  #widget {
    display: none; flex-direction: column;
    width: 100%; max-width: 320px; padding-bottom: 2rem;
  }

  /* top bar */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px var(--PX) 8px;
  }
  .top-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; }
  .top-controls { display: flex; gap: 5px; align-items: center; }
  .tab {
    font-family: 'Nunito', sans-serif; font-size: 0.68rem; font-weight: 700;
    padding: 3px 11px; border-radius: 20px; border: none;
    background: #f0ebff; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .tab.active { background: var(--text-main); color: white; }

  /* gcal link */
  .gcal-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 9px 3px 7px; border-radius: 20px;
    background: #f0ebff; color: var(--text-muted);
    font-family: 'Nunito', sans-serif; font-size: 0.65rem; font-weight: 700;
    text-decoration: none; transition: all 0.15s;
  }
  .gcal-btn:hover { background: var(--text-main); color: white; }
  .gcal-btn svg { width: 10px; height: 10px; flex-shrink: 0; }

  /* nav */
  .nav-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 2px 0 8px;
  }
  .nav-btn {
    background: #f0ebff; border: none; border-radius: 50%;
    width: 26px; height: 26px; font-size: 0.9rem; color: var(--text-main);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--text-main); color: white; }
  .nav-date { font-size: 0.78rem; font-weight: 800; color: var(--text-main); min-width: 100px; text-align: center; }

  /* inner pastel card */
  .inner-card {
    margin: 0 var(--PX);
    background: var(--bg-in);
    border-radius: 20px;
    padding: 12px 12px 14px;
    position: relative;
  }

  /* next badge */
  .next-badge { text-align: center; padding: 4px 0 10px; }
  .next-mins { font-size: 2.2rem; font-weight: 800; color: #b090e0; letter-spacing: -0.04em; line-height: 1; }
  .next-sub { font-size: 0.62rem; color: var(--text-muted); font-weight: 700; margin-top: 1px; }

  /* allday */
  .allday-strip { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .allday-chip {
    background: white; border-radius: 20px; font-size: 0.62rem; font-weight: 700;
    color: var(--text-muted); padding: 3px 9px; box-shadow: var(--shadow);
  }

  /* timeline */
  .tl-wrap { position: relative; }
  .spine-line {
    position: absolute; left: 33px; top: 0; bottom: 0;
    width: 1.5px; background: var(--spine); border-radius: 2px;
  }
  .hour-row { display: flex; align-items: flex-start; height: var(--SLOT); }
  .hour-label {
    width: 33px; text-align: right; padding-right: 10px;
    font-size: 0.68rem; font-weight: 700; color: var(--text-muted);
    padding-top: 2px; flex-shrink: 0;
  }
  .events-col {
    flex: 1; padding-left: 10px;
    display: flex; flex-direction: column; gap: 3px;
  }

  /* event card */
  .event-card {
    border-radius: 14px; padding: 8px 11px;
    font-size: 0.78rem; font-weight: 700;
    display: flex; flex-direction: column; gap: 2px;
    box-shadow: 0 1px 6px rgba(140,110,200,0.08);
    animation: popIn 0.2s cubic-bezier(.34,1.4,.64,1);
  }
  .event-time-lbl { font-size: 0.6rem; font-weight: 600; opacity: 0.6; }

  .yellow{background:var(--yellow-bg);color:var(--yellow-text);}
  .purple{background:var(--purple-bg);color:var(--purple-text);}
  .blue{background:var(--blue-bg);color:var(--blue-text);}
  .green{background:var(--green-bg);color:var(--green-text);}
  .pink{background:var(--pink-bg);color:var(--pink-text);}
  .peach{background:var(--peach-bg);color:var(--peach-text);}

  /* now line */
  .now-wrap {
    position: absolute; left: 0; right: 0;
    display: flex; align-items: center; pointer-events: none; z-index: 10;
  }
  .now-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--now-color); margin-left: 29px; flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(240,120,120,0.2);
  }
  .now-rule { flex: 1; height: 1.5px; background: var(--now-color); opacity: 0.5; }
  .now-txt { font-size: 0.6rem; font-weight: 800; color: var(--now-color); padding-right: 2px; }

  /* week */
  .week-scroll { overflow-x: auto; }
  .week-grid { display: grid; min-width: 420px; }
  .week-day-hdr { text-align: center; padding: 4px 2px 6px; }
  .week-day-hdr .wd { font-size: 0.56rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; }
  .week-day-hdr .wn { font-size: 0.9rem; font-weight: 800; color: var(--text-main); }
  .week-day-hdr.today .wn { color: #9070d0; }
  .week-hour-lbl {
    font-size: 0.56rem; font-weight: 700; color: var(--text-muted);
    text-align: right; padding-right: 5px; padding-top: 3px;
  }
  .week-cell {
    border-top: 1px solid var(--spine);
    height: var(--SLOT);
    position: relative; overflow: hidden;
  }
  .week-cell.today-col { background: rgba(160,130,220,0.04); }
  .week-ev {
    position: absolute; left: 2px; right: 2px;
    border-radius: 8px; font-size: 0.55rem; font-weight: 700;
    padding: 2px 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    line-height: 1.4;
  }

  /* reset */
  .reset-btn {
    background: none; border: none; font-size: 0.62rem; color: var(--text-muted);
    cursor: pointer; font-family: 'Nunito', sans-serif;
    text-decoration: underline; text-underline-offset: 2px;
    margin-top: 10px; align-self: center; display: block;
  }

  @keyframes popIn {
    from{opacity:0;transform:scale(0.9) translateY(3px);}
    to{opacity:1;transform:scale(1) translateY(0);}
  }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-emoji">🗓️</div>
  <div class="setup-title">캘린더 타임라인</div>
  <p class="setup-desc">구글 캘린더 API 키와<br>캘린더 ID를 입력해 주세요</p>
  <div class="input-group">
    <label>Google API Key</label>
    <input id="apiKeyInput" type="password" placeholder="AIza..." spellcheck="false" autocomplete="off">
  </div>
  <div class="input-group">
    <label>Calendar ID</label>
    <input id="calIdInput" type="text" placeholder="your@gmail.com" spellcheck="false">
  </div>
  <button class="btn-start" onclick="saveAndStart()">시작하기 ✨</button>
  <p class="setup-desc" style="margin-top:.3rem">
    🔑 Google Cloud Console → 사용자 인증 정보 → API 키<br>
    📌 구글 캘린더 설정 → 캘린더 통합 → 캘린더 ID
  </p>
</div>

<div id="widget">
  <div class="top-bar">
    <span class="top-label">Timeline ✦</span>
    <div class="top-controls">
      <a class="gcal-btn" href="https://calendar.google.com" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
        </svg>
        캘린더 열기
      </a>
      <button class="tab active" id="btnDay" onclick="setView('day')">일</button>
      <button class="tab" id="btnWeek" onclick="setView('week')">주</button>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="navigate(-1)">‹</button>
    <div class="nav-date" id="navDate">—</div>
    <button class="nav-btn" onclick="navigate(1)">›</button>
  </div>

  <div id="calContent"></div>
  <button class="reset-btn" onclick="resetSetup()">설정 변경</button>
</div>

<script>
let API_KEY='', CAL_ID='', VIEW='day';
let cursor = new Date();

const SLOT = 48;
const START_H = 7, END_H = 22;
const DOW_EN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DOW_KO = ['일','월','화','수','목','금','토'];
const COLOR_MAP = {'1':'purple','2':'green','3':'purple','4':'pink','5':'yellow','6':'peach','7':'blue','8':'purple','9':'blue','10':'green','11':'pink'};
const PALETTE = ['yellow','purple','blue','green','pink','peach'];
let pi = 0;
function nc() { return PALETTE[pi++ % PALETTE.length]; }

window.onload = () => {
  const k = localStorage.getItem('gcal_key');
  const c = localStorage.getItem('gcal_id');
  if (k && c) { API_KEY=k; CAL_ID=c; showWidget(); }
};

function saveAndStart() {
  const k = document.getElementById('apiKeyInput').value.trim();
  const c = document.getElementById('calIdInput').value.trim();
  if (!k||!c) { alert('API 키와 캘린더 ID를 모두 입력해 주세요 🙏'); return; }
  API_KEY=k; CAL_ID=c;
  localStorage.setItem('gcal_key',k);
  localStorage.setItem('gcal_id',c);
  showWidget();
}

function resetSetup() {
  document.getElementById('setup').style.display='flex';
  document.getElementById('widget').style.display='none';
}

function showWidget() {
  document.getElementById('setup').style.display='none';
  document.getElementById('widget').style.display='flex';
  cursor = new Date();
  render();
}

function navigate(dir) {
  if (VIEW==='day') cursor.setDate(cursor.getDate()+dir);
  else cursor.setDate(cursor.getDate()+dir*7);
  render();
}

function setView(v) {
  VIEW=v;
  document.getElementById('btnDay').classList.toggle('active',v==='day');
  document.getElementById('btnWeek').classList.toggle('active',v==='week');
  render();
}

async function render() {
  updateNav();
  const cont = document.getElementById('calContent');
  cont.innerHTML = `<div style="text-align:center;padding:2rem 0;color:var(--text-muted);font-size:.8rem;font-weight:700">불러오는 중… 🌸</div>`;
  try {
    if (VIEW==='day') await renderDay(cont);
    else await renderWeek(cont);
  } catch(e) {
    cont.innerHTML = `<div style="text-align:center;padding:1.5rem;color:#f07878;font-size:.78rem;font-weight:700;line-height:2">
      오류가 발생했어요 😢<br>
      <span style="color:var(--text-muted);font-size:.68rem">${e.message}</span>
    </div>`;
  }
}

function updateNav() {
  const el = document.getElementById('navDate');
  if (VIEW==='day') {
    el.textContent = `${cursor.getMonth()+1}월 ${cursor.getDate()}일 ${DOW_KO[cursor.getDay()]}`;
  } else {
    const mon = wkStart(cursor);
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);
    el.textContent = `${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()}`;
  }
}

async function renderDay(cont) {
  pi=0;
  const {tMin,tMax} = dayRange(cursor);
  const events = await fetchEvents(tMin,tMax);
  const timed = events.filter(e=>e.start.dateTime);
  const allday = events.filter(e=>!e.start.dateTime);
  const now = new Date();
  const isToday = sameDay(cursor,now);
  const nowH = now.getHours()+now.getMinutes()/60;

  const upcoming = timed
    .map(e=>({h:new Date(e.start.dateTime).getHours()+new Date(e.start.dateTime).getMinutes()/60}))
    .filter(x=>x.h>nowH).sort((a,b)=>a.h-b.h)[0];
  const minsLeft = upcoming ? Math.round((upcoming.h-nowH)*60) : null;

  let html = `<div class="inner-card">`;

  if (isToday && minsLeft!==null) {
    html+=`<div class="next-badge">
      <div class="next-mins">- ${minsLeft} M</div>
      <div class="next-sub">다음 일정까지</div>
    </div>`;
  }

  if (allday.length) {
    html+=`<div class="allday-strip">`;
    allday.forEach(e=>{ html+=`<span class="allday-chip">📌 ${esc(e.summary||'(제목 없음)')}</span>`; });
    html+=`</div>`;
  }

  const byHour={};
  timed.forEach(e=>{ const h=new Date(e.start.dateTime).getHours(); (byHour[h]=byHour[h]||[]).push(e); });

  html+=`<div class="tl-wrap" id="dayTl" style="position:relative"><div class="spine-line"></div>`;

  for (let h=START_H; h<=END_H; h++) {
    const evs=byHour[h]||[];
    html+=`<div class="hour-row">
      <div class="hour-label">${h}</div>
      <div class="events-col">`;
    evs.forEach(e=>{
      const color=COLOR_MAP[e.colorId]||nc();
      const st=fmtTime(e.start.dateTime), en=fmtTime(e.end.dateTime);
      const durH=(new Date(e.end.dateTime)-new Date(e.start.dateTime))/3600000;
      const minH=Math.max(34,Math.round(durH*SLOT));
      html+=`<div class="event-card ${color}" style="min-height:${minH}px">
        <div>${esc(e.summary||'(제목 없음)')}</div>
        <div class="event-time-lbl">${st} – ${en}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }
  html+=`</div></div>`;
  cont.innerHTML=html;

  if (isToday) {
    const tl=document.getElementById('dayTl');
    const totalSlots=END_H-START_H+1;
    const pct=Math.max(0,Math.min(1,(nowH-START_H)/totalSlots));
    const yPos=Math.round(pct*totalSlots*SLOT);
    const line=document.createElement('div');
    line.className='now-wrap';
    line.style.top=yPos+'px';
    line.innerHTML=`<div class="now-dot"></div><div class="now-rule"></div><div class="now-txt">${pad(now.getHours())}:${pad(now.getMinutes())}</div>`;
    tl.appendChild(line);
  }
}

async function renderWeek(cont) {
  pi=0;
  const mon=wkStart(cursor);
  const days=Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(d.getDate()+i); return d; });
  const end=new Date(days[6]); end.setDate(end.getDate()+1);
  const events=await fetchEvents(mon.toISOString(),end.toISOString());
  const now=new Date();

  let html=`<div class="inner-card"><div class="week-scroll">
    <div class="week-grid" style="grid-template-columns:32px repeat(7,1fr)">`;

  html+=`<div></div>`;
  days.forEach(d=>{
    const isT=sameDay(d,now);
    html+=`<div class="week-day-hdr${isT?' today':''}">
      <div class="wd">${DOW_EN[d.getDay()]}</div>
      <div class="wn">${d.getDate()}</div>
    </div>`;
  });

  for (let h=START_H; h<=END_H; h++) {
    html+=`<div class="week-hour-lbl" style="height:${SLOT}px;line-height:1;padding-top:3px">${h}</div>`;
    days.forEach(d=>{
      const isT=sameDay(d,now);
      const evs=events.filter(e=>{
        if(!e.start.dateTime) return false;
        const s=new Date(e.start.dateTime);
        return sameDay(s,d)&&s.getHours()===h;
      });
      html+=`<div class="week-cell${isT?' today-col':''}">`;
      evs.forEach(e=>{
        const color=COLOR_MAP[e.colorId]||nc();
        const s=new Date(e.start.dateTime);
        const en=new Date(e.end.dateTime);
        const startMin=s.getMinutes();
        const durMin=(en-s)/60000;
        const topPx=Math.round((startMin/60)*SLOT);
        const heightPx=Math.max(14,Math.round((durMin/60)*SLOT));
        html+=`<div class="week-ev ${color}" style="top:${topPx}px;height:${heightPx}px">${esc(e.summary||'…')}</div>`;
      });
      html+=`</div>`;
    });
  }
  html+=`</div></div></div>`;
  cont.innerHTML=html;
}

async function fetchEvents(tMin,tMax) {
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events`
    +`?key=${API_KEY}&timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}`
    +`&singleEvents=true&orderBy=startTime&maxResults=200`;
  const r=await fetch(url);
  if (!r.ok) { const j=await r.json().catch(()=>({})); throw new Error(j.error?.message||`HTTP ${r.status}`); }
  return (await r.json()).items||[];
}

function dayRange(d) {
  const s=new Date(d); s.setHours(0,0,0,0);
  const e=new Date(d); e.setHours(23,59,59,999);
  return {tMin:s.toISOString(),tMax:e.toISOString()};
}
function wkStart(d) {
  const r=new Date(d); const day=r.getDay();
  r.setDate(r.getDate()-(day===0?6:day-1)); r.setHours(0,0,0,0); return r;
}
function sameDay(a,b) {
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}
function fmtTime(iso) {
  if(!iso) return ''; const d=new Date(iso);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
