<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0ff;
    --card-bg: #ffffff;
    --spine: #e2d9f3;
    --text-main: #5a4a8a;
    --text-muted: #b0a0d0;
    --now-color: #f07878;
    --shadow: 0 2px 12px rgba(140,110,200,0.10);
    --yellow-bg: #fef9e0; --yellow-text: #b89a20;
    --purple-bg: #ede8f8; --purple-text: #7a60c0;
    --blue-bg:   #dff0fc; --blue-text:   #4a8fc0;
    --green-bg:  #e0f7ec; --green-text:  #3a9868;
    --pink-bg:   #fde8f2; --pink-text:   #c060a0;
    --peach-bg:  #feeee6; --peach-text:  #c07848;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Setup ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    gap: 1.1rem;
    width: 100%;
    max-width: 380px;
  }
  .setup-emoji { font-size: 2.8rem; }
  .setup-title { font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
  .setup-desc { font-size: 0.78rem; color: var(--text-muted); text-align: center; line-height: 1.8; }
  .input-group { display: flex; flex-direction: column; gap: 5px; width: 100%; }
  .input-group label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; }
  .input-group input {
    background: white; border: 1.5px solid var(--spine); color: var(--text-main);
    font-family: 'Nunito', sans-serif; font-size: 0.85rem; padding: 0.65rem 1rem;
    border-radius: 14px; outline: none; transition: border-color 0.2s;
    box-shadow: var(--shadow);
  }
  .input-group input:focus { border-color: #c0a8f0; }
  .btn-start {
    background: var(--text-main); color: white; border: none;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 800;
    padding: 0.75rem 2rem; border-radius: 50px; cursor: pointer; width: 100%;
    transition: transform 0.12s, opacity 0.12s;
    box-shadow: 0 4px 16px rgba(90,70,140,0.25);
  }
  .btn-start:hover { opacity: 0.88; }
  .btn-start:active { transform: scale(0.97); }

  /* ── Widget ── */
  #widget {
    display: none; flex-direction: column;
    width: 100%; max-width: 340px; min-height: 100vh; padding: 0 0 3rem;
  }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 1.2rem 0.5rem;
  }
  .top-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; }
  .top-controls { display: flex; gap: 5px; }
  .tab {
    font-family: 'Nunito', sans-serif; font-size: 0.7rem; font-weight: 700;
    padding: 4px 12px; border-radius: 20px; border: none;
    background: white; color: var(--text-muted); cursor: pointer;
    box-shadow: var(--shadow); transition: all 0.15s;
  }
  .tab.active { background: var(--text-main); color: white; }

  /* nav */
  .nav-row {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 0.4rem 0 0.3rem;
  }
  .nav-btn {
    background: white; border: none; border-radius: 50%;
    width: 30px; height: 30px; font-size: 1rem; color: var(--text-main);
    cursor: pointer; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  .nav-btn:active { transform: scale(0.92); }
  .nav-date { font-size: 0.82rem; font-weight: 800; color: var(--text-main); min-width: 110px; text-align: center; }

  /* next badge */
  .next-badge { text-align: center; padding: 0.5rem 1rem 0.8rem; }
  .next-mins { font-size: 2.8rem; font-weight: 800; color: #b090e0; letter-spacing: -0.04em; line-height: 1; }
  .next-sub { font-size: 0.68rem; color: var(--text-muted); font-weight: 700; margin-top: 2px; }

  /* day header */
  .day-header { text-align: center; padding: 0.3rem 0 0.7rem; }
  .day-dow { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; }
  .day-dom { font-size: 2.1rem; font-weight: 800; color: var(--text-main); line-height: 1.1; }

  /* allday */
  .allday-strip { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 1.2rem 0.9rem; }
  .allday-chip {
    background: white; border-radius: 20px; font-size: 0.67rem; font-weight: 700;
    color: var(--text-muted); padding: 4px 11px; box-shadow: var(--shadow);
  }

  /* column */
  .col-wrap { display: flex; padding: 0 1rem; position: relative; }
  .spine {
    position: absolute; left: calc(1rem + 38px); top: 0; bottom: 0;
    width: 1.5px; background: var(--spine); border-radius: 2px;
  }
  .timeline { flex: 1; position: relative; }
  .hour-row { display: flex; align-items: flex-start; min-height: 62px; }
  .hour-label {
    width: 38px; text-align: right; padding-right: 12px;
    font-size: 0.67rem; font-weight: 700; color: var(--text-muted);
    padding-top: 2px; flex-shrink: 0;
  }
  .events-col {
    flex: 1; padding-left: 14px; padding-right: 2px; padding-bottom: 6px;
    display: flex; flex-direction: column; gap: 5px;
  }

  /* event tag pill */
  .event-tag {
    display: inline-block; font-size: 0.6rem; font-weight: 800;
    border-radius: 20px; padding: 3px 10px; letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  /* event card */
  .event-card {
    border-radius: 18px; padding: 13px 15px; font-size: 0.82rem; font-weight: 700;
    display: flex; flex-direction: column; gap: 3px;
    box-shadow: var(--shadow); animation: popIn 0.22s cubic-bezier(.34,1.4,.64,1);
  }
  .event-time-lbl { font-size: 0.62rem; font-weight: 600; opacity: 0.6; }

  /* colors */
  .yellow { background: var(--yellow-bg); color: var(--yellow-text); }
  .purple { background: var(--purple-bg); color: var(--purple-text); }
  .blue   { background: var(--blue-bg);   color: var(--blue-text);   }
  .green  { background: var(--green-bg);  color: var(--green-text);  }
  .pink   { background: var(--pink-bg);   color: var(--pink-text);   }
  .peach  { background: var(--peach-bg);  color: var(--peach-text);  }

  /* now line */
  .now-wrap {
    position: absolute; left: 0; right: 0;
    display: flex; align-items: center;
    pointer-events: none; z-index: 10;
  }
  .now-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--now-color); margin-left: 34px; flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(240,120,120,0.2);
  }
  .now-rule { flex: 1; height: 1.5px; background: var(--now-color); opacity: 0.5; }
  .now-txt { font-size: 0.62rem; font-weight: 800; color: var(--now-color); padding-right: 2px; }

  /* week */
  .week-scroll { overflow-x: auto; padding: 0 1rem; }
  .week-grid { display: grid; min-width: 460px; }
  .week-day-hdr { text-align: center; padding: 0.3rem 0.2rem 0.5rem; }
  .week-day-hdr .wd { font-size: 0.58rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; }
  .week-day-hdr .wn { font-size: 1rem; font-weight: 800; color: var(--text-main); }
  .week-day-hdr.today .wn { color: #9070d0; }
  .week-hour-lbl { font-size: 0.56rem; font-weight: 700; color: var(--text-muted); text-align: right; padding-right: 6px; padding-top: 4px; }
  .week-cell { border-top: 1px solid var(--spine); min-height: 44px; padding: 3px 3px; display: flex; flex-direction: column; gap: 2px; }
  .week-cell.today-col { background: rgba(160,130,220,0.05); }
  .week-ev {
    border-radius: 10px; font-size: 0.58rem; font-weight: 700;
    padding: 3px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* reset */
  .reset-btn {
    background: none; border: none; font-size: 0.65rem; color: var(--text-muted);
    cursor: pointer; font-family: 'Nunito', sans-serif;
    text-decoration: underline; text-underline-offset: 2px;
    margin-top: 0.8rem; align-self: center;
  }

  @keyframes popIn {
    from { opacity:0; transform: scale(0.88) translateY(4px); }
    to   { opacity:1; transform: scale(1)    translateY(0);   }
  }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-emoji">🗓️</div>
  <div class="setup-title">캘린더 타임라인</div>
  <p class="setup-desc">구글 캘린더 API 키와<br>캘린더 ID를 입력해 주세요</p>
  <div class="input-group">
    <label>Google API Key</label>
    <input id="apiKeyInput" type="password" placeholder="AIza..." spellcheck="false" autocomplete="off">
  </div>
  <div class="input-group">
    <label>Calendar ID</label>
    <input id="calIdInput" type="text" placeholder="your@gmail.com" spellcheck="false">
  </div>
  <button class="btn-start" onclick="saveAndStart()">시작하기 ✨</button>
  <p class="setup-desc" style="margin-top:.4rem">
    🔑 Google Cloud Console → API 및 서비스 → 사용자 인증 정보<br>
    📌 구글 캘린더 설정 → 캘린더 통합 → 캘린더 ID
  </p>
</div>

<div id="widget">
  <div class="top-bar">
    <span class="top-label">Timeline ✦</span>
    <div class="top-controls">
      <button class="tab active" id="btnDay" onclick="setView('day')">일</button>
      <button class="tab" id="btnWeek" onclick="setView('week')">주</button>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="navigate(-1)">‹</button>
    <div class="nav-date" id="navDate">—</div>
    <button class="nav-btn" onclick="navigate(1)">›</button>
  </div>
  <div id="calContent"></div>
  <button class="reset-btn" onclick="resetSetup()">설정 변경</button>
</div>

<script>
let API_KEY='', CAL_ID='', VIEW='day';
let cursor = new Date();

const SLOT_H = 62, START_H = 7, END_H = 22;
const DOW_EN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DOW_KO = ['일','월','화','수','목','금','토'];
const COLOR_MAP = {'1':'purple','2':'green','3':'purple','4':'pink','5':'yellow','6':'peach','7':'blue','8':'purple','9':'blue','10':'green','11':'pink'};
const PALETTE = ['yellow','purple','blue','green','pink','peach'];
let pi = 0;
function nc() { return PALETTE[pi++ % PALETTE.length]; }

window.onload = () => {
  const k = localStorage.getItem('gcal_key');
  const c = localStorage.getItem('gcal_id');
  if (k && c) { API_KEY=k; CAL_ID=c; showWidget(); }
};

function saveAndStart() {
  const k = document.getElementById('apiKeyInput').value.trim();
  const c = document.getElementById('calIdInput').value.trim();
  if (!k||!c) { alert('API 키와 캘린더 ID를 모두 입력해 주세요 🙏'); return; }
  API_KEY=k; CAL_ID=c;
  localStorage.setItem('gcal_key',k);
  localStorage.setItem('gcal_id',c);
  showWidget();
}

function resetSetup() {
  document.getElementById('setup').style.display='flex';
  document.getElementById('widget').style.display='none';
}

function showWidget() {
  document.getElementById('setup').style.display='none';
  document.getElementById('widget').style.display='flex';
  cursor = new Date();
  render();
}

function navigate(dir) {
  if (VIEW==='day') cursor.setDate(cursor.getDate()+dir);
  else cursor.setDate(cursor.getDate()+dir*7);
  render();
}

function setView(v) {
  VIEW=v;
  document.getElementById('btnDay').classList.toggle('active',v==='day');
  document.getElementById('btnWeek').classList.toggle('active',v==='week');
  render();
}

async function render() {
  updateNav();
  const c = document.getElementById('calContent');
  c.innerHTML = `<div style="text-align:center;padding:3rem 0;color:var(--text-muted);font-size:.85rem;font-weight:700">불러오는 중… 🌸</div>`;
  try {
    if (VIEW==='day') await renderDay(c);
    else await renderWeek(c);
  } catch(e) {
    c.innerHTML = `<div style="text-align:center;padding:2rem;color:#f07878;font-size:.8rem;font-weight:700;line-height:2">
      오류가 발생했어요 😢<br>
      <span style="color:var(--text-muted);font-size:.7rem">${e.message}</span>
    </div>`;
  }
}

function updateNav() {
  const el = document.getElementById('navDate');
  if (VIEW==='day') {
    el.textContent = `${cursor.getMonth()+1}월 ${cursor.getDate()}일 ${DOW_KO[cursor.getDay()]}`;
  } else {
    const mon = wkStart(cursor);
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);
    el.textContent = `${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()}`;
  }
}

async function renderDay(cont) {
  pi=0;
  const {tMin,tMax} = dayRange(cursor);
  const events = await fetchEvents(tMin,tMax);
  const timed = events.filter(e=>e.start.dateTime);
  const allday = events.filter(e=>!e.start.dateTime);
  const now = new Date();
  const isToday = sameDay(cursor,now);
  const nowH = now.getHours()+now.getMinutes()/60;

  // next event countdown
  const upcoming = timed
    .map(e=>({h: new Date(e.start.dateTime).getHours()+new Date(e.start.dateTime).getMinutes()/60, e}))
    .filter(x=>x.h>nowH).sort((a,b)=>a.h-b.h)[0];
  const minsLeft = upcoming ? Math.round((upcoming.h-nowH)*60) : null;

  let html='';

  if (isToday && minsLeft!==null) {
    html+=`<div class="next-badge">
      <div class="next-mins">- ${minsLeft} M</div>
      <div class="next-sub">다음 일정까지</div>
    </div>`;
  }

  html+=`<div class="day-header">
    <div class="day-dow">${DOW_EN[cursor.getDay()]}</div>
    <div class="day-dom">${cursor.getDate()}</div>
  </div>`;

  if (allday.length) {
    html+=`<div class="allday-strip">`;
    allday.forEach(e => { html+=`<span class="allday-chip">📌 ${esc(e.summary||'(제목 없음)')}</span>`; });
    html+=`</div>`;
  }

  html+=`<div class="col-wrap"><div class="spine"></div><div class="timeline" id="dayTl" style="position:relative">`;

  const byHour={};
  timed.forEach(e=>{ const h=new Date(e.start.dateTime).getHours(); (byHour[h]=byHour[h]||[]).push(e); });

  for (let h=START_H; h<=END_H; h++) {
    const evs=byHour[h]||[];
    html+=`<div class="hour-row">
      <div class="hour-label">${h===START_H?'':h}</div>
      <div class="events-col">`;
    evs.forEach(e=>{
      const color=COLOR_MAP[e.colorId]||nc();
      const st=fmtTime(e.start.dateTime), en=fmtTime(e.end.dateTime);
      const durH=(new Date(e.end.dateTime)-new Date(e.start.dateTime))/3600000;
      const minH=Math.max(52,Math.round(durH*SLOT_H));
      html+=`<div class="event-card ${color}" style="min-height:${minH}px">
        <div>${esc(e.summary||'(제목 없음)')}</div>
        <div class="event-time-lbl">${st} – ${en}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }
  html+=`</div></div>`;
  cont.innerHTML=html;

  if (isToday) {
    const tl=document.getElementById('dayTl');
    const totalSlots=END_H-START_H+1;
    const pct=Math.max(0,Math.min(1,(nowH-START_H)/totalSlots));
    const yPos=Math.round(pct*totalSlots*SLOT_H);
    const line=document.createElement('div');
    line.className='now-wrap';
    line.style.top=yPos+'px';
    line.innerHTML=`<div class="now-dot"></div><div class="now-rule"></div><div class="now-txt">${pad(now.getHours())}:${pad(now.getMinutes())}</div>`;
    tl.appendChild(line);
    setTimeout(()=>{
      const badgeH=cont.querySelector('.next-badge')?.offsetHeight||0;
      const hdrH=cont.querySelector('.day-header')?.offsetHeight||0;
      const adH=cont.querySelector('.allday-strip')?.offsetHeight||0;
      window.scrollTo({top:Math.max(0,badgeH+hdrH+adH+yPos-130),behavior:'smooth'});
    },150);
  }
}

async function renderWeek(cont) {
  pi=0;
  const mon=wkStart(cursor);
  const days=Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(d.getDate()+i); return d; });
  const end=new Date(days[6]); end.setDate(end.getDate()+1);
  const events=await fetchEvents(mon.toISOString(),end.toISOString());
  const now=new Date();

  let html=`<div class="week-scroll"><div class="week-grid" style="grid-template-columns:36px repeat(7,1fr)">`;
  html+=`<div></div>`;
  days.forEach(d=>{
    const isT=sameDay(d,now);
    html+=`<div class="week-day-hdr${isT?' today':''}">
      <div class="wd">${DOW_EN[d.getDay()]}</div>
      <div class="wn">${d.getDate()}</div>
    </div>`;
  });

  for (let h=START_H; h<=END_H; h++) {
    html+=`<div class="week-hour-lbl">${h}</div>`;
    days.forEach(d=>{
      const isT=sameDay(d,now);
      const evs=events.filter(e=>{
        if(!e.start.dateTime) return false;
        const s=new Date(e.start.dateTime);
        return sameDay(s,d)&&s.getHours()===h;
      });
      html+=`<div class="week-cell${isT?' today-col':''}">`;
      evs.forEach(e=>{ const color=COLOR_MAP[e.colorId]||nc(); html+=`<div class="week-ev ${color}">${esc(e.summary||'…')}</div>`; });
      html+=`</div>`;
    });
  }
  html+=`</div></div>`;
  cont.innerHTML=html;
}

async function fetchEvents(tMin,tMax) {
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events`
    +`?key=${API_KEY}&timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}`
    +`&singleEvents=true&orderBy=startTime&maxResults=200`;
  const r=await fetch(url);
  if (!r.ok) { const j=await r.json().catch(()=>({})); throw new Error(j.error?.message||`HTTP ${r.status}`); }
  return (await r.json()).items||[];
}

function dayRange(d) {
  const s=new Date(d); s.setHours(0,0,0,0);
  const e=new Date(d); e.setHours(23,59,59,999);
  return {tMin:s.toISOString(),tMax:e.toISOString()};
}

function wkStart(d) {
  const r=new Date(d); const day=r.getDay();
  r.setDate(r.getDate()-(day===0?6:day-1)); r.setHours(0,0,0,0); return r;
}

function sameDay(a,b) {
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}

function fmtTime(iso) {
  if(!iso) return '';
  const d=new Date(iso);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
